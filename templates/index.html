<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Polsia Platform - Part A</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 0; background: #0f1115; color: #e9eef5; }
    .wrap { padding: 18px; display: grid; gap: 14px; }
    .card { background: #171b22; border: 1px solid #2b3442; border-radius: 12px; padding: 12px; }
    button { background: #4f8cff; color: white; border: none; border-radius: 8px; padding: 8px 10px; margin-right: 6px; }
    input, textarea, select { width: 100%; background: #0f1115; color: #e9eef5; border: 1px solid #2b3442; border-radius: 8px; padding: 8px; margin: 6px 0; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .run { display:grid; grid-template-columns: 1fr 1fr; gap:12px; max-height: 420px; }
    .pane { overflow: auto; white-space: pre-wrap; background:#10151d; border-radius:8px; padding: 8px; border: 1px solid #2b3442; }
    .small { font-size: 12px; color: #95a2b5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Home: Create or Load Generation Flow</h2>
      <div id="flowList"></div>
    </div>

    <div class="card grid2">
      <div>
        <h3>Create / Edit Flow</h3>
        <input id="flowId" placeholder="flow id for edit (optional)" />
        <input id="flowName" placeholder="flow name" />
        <textarea id="flowDesc" placeholder="description"></textarea>
        <select id="execMode"><option>sequential</option><option>parallel</option><option>mixed</option></select>
        <textarea id="flowStages" rows="8">[
  {"stage_key":"elements","stage_order":1,"enabled":true,"stage_params":{"element_groups":["main_characters","locations","situations"],"count_per_group":2}},
  {"stage_key":"headline_formats","stage_order":2,"enabled":true,"stage_params":{"format_count":3}},
  {"stage_key":"headlines","stage_order":3,"enabled":true,"stage_params":{"headline_count":5,"context_mode":"elements+formats"}}
]</textarea>
        <button onclick="saveFlow()">Save Flow</button>
      </div>
      <div>
        <h3>Quick Access</h3>
        <button onclick="loadEntities()">Prompt Blocks / Agents / Personas</button>
        <button onclick="loadDb()">Database Inspection</button>
        <textarea id="entities" rows="18" placeholder="Entity inspector output"></textarea>
      </div>
    </div>

    <div class="card grid2">
      <div>
        <h3>Platform Agent Assistant</h3>
        <textarea id="intent" rows="4" placeholder="Describe the flow and setup you want"></textarea>
        <button onclick="askPlatformAgent()">Suggest Configuration</button>
        <textarea id="platformResponse" rows="14"></textarea>
      </div>
      <div>
        <h3>Run Flow</h3>
        <input id="runFlowId" placeholder="flow id" />
        <button onclick="startRun()">Run</button>
        <p class="small">Live monitor has raw logs on left and full agent conversations on right.</p>
        <div class="run">
          <div class="pane" id="logsPane"></div>
          <div class="pane" id="chatPane"></div>
        </div>
      </div>
    </div>
  </div>
<script>
let currentRun = null;

async function j(url, opts={}) { return (await fetch(url, {headers:{'content-type':'application/json'}, ...opts})).json(); }

async function loadHome() {
  const b = await j('/api/bootstrap');
  document.getElementById('flowList').innerText = JSON.stringify(b, null, 2);
}

async function saveFlow() {
  const payload = {
    id: document.getElementById('flowId').value ? Number(document.getElementById('flowId').value) : undefined,
    name: document.getElementById('flowName').value,
    description: document.getElementById('flowDesc').value,
    execution_mode: document.getElementById('execMode').value,
    stages: JSON.parse(document.getElementById('flowStages').value)
  };
  const res = await j('/api/flows', {method:'POST', body: JSON.stringify(payload)});
  alert('saved flow ' + res.id);
  await loadHome();
}

async function loadEntities() {
  const [agents, personas, blocks] = await Promise.all([j('/api/agents'), j('/api/personas'), j('/api/prompt-blocks')]);
  document.getElementById('entities').value = JSON.stringify({agents, personas, blocks}, null, 2);
}

async function loadDb() {
  const db = await j('/api/database/content');
  document.getElementById('entities').value = JSON.stringify(db, null, 2);
}

async function askPlatformAgent() {
  const res = await j('/api/platform-agent/propose', {method:'POST', body: JSON.stringify({intent: document.getElementById('intent').value})});
  document.getElementById('platformResponse').value = JSON.stringify(res, null, 2);
}

async function startRun() {
  const flowId = Number(document.getElementById('runFlowId').value);
  const r = await j('/api/runs', {method:'POST', body: JSON.stringify({flow_id: flowId})});
  currentRun = r.run_id;
  pollRun();
}

async function pollRun() {
  if (!currentRun) return;
  const data = await j(`/api/runs/${currentRun}`);
  document.getElementById('logsPane').innerText = data.events.map(e=>`[${e.ts}] ${e.stage_key}/${e.agent_name}: ${e.message}`).join('\n\n');
  document.getElementById('chatPane').innerText = data.conversation.map(c=>`[${c.ts}] ${c.stage_key} | ${c.agent_name} | ${c.role}\n${c.content}`).join('\n\n----------------\n\n');
  if (data.run.status !== 'completed') setTimeout(pollRun, 1200);
}

loadHome();
</script>
</body>
</html>
