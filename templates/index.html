<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Project Viral Agentic Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f172a; color: #e2e8f0; }
    .card { background: #111827; border: 1px solid #334155; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; }
    .logbox { height: 300px; overflow: auto; background: #020617; border: 1px solid #1e293b; padding: 10px; }
  </style>
</head>
<body class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3">Project Viral Agentic Studio</h1>
    <span class="badge text-bg-info">Flask UI @ :4000</span>
  </div>

  <div class="row g-3">
    <div class="col-lg-4">
      <div class="card p-3">
        <h2 class="h5">Generation Controls</h2>
        <label class="form-label">Stages</label>
        <select id="stages" class="form-select" multiple size="8">
          {% for stage in stage_values %}<option value="{{stage}}" selected>{{stage}}</option>{% endfor %}
        </select>

        <div class="row mt-2 g-2">
          <div class="col">
            <label class="form-label">Mode</label>
            <select id="mode" class="form-select"><option>sequential</option><option>parallel</option></select>
          </div>
          <div class="col">
            <label class="form-label">Output count</label>
            <input id="output_count" type="number" class="form-control" value="3" min="1" max="20"/>
          </div>
        </div>

        <div class="row mt-2 g-2">
          <div class="col"><label class="form-label">Target minutes</label><input id="target_minutes" type="number" class="form-control" value="2"></div>
          <div class="col"><label class="form-label">Target parts</label><input id="target_parts" type="number" class="form-control" value="3"></div>
        </div>

        <div class="row mt-2 g-2">
          <div class="col"><label class="form-label">Temperature</label><input id="temperature" type="number" step="0.1" class="form-control" value="0.7"></div>
          <div class="col"><label class="form-label">Max context chars</label><input id="max_context_chars" type="number" class="form-control" value="12000"></div>
        </div>

        <label class="form-label mt-2">Custom instruction</label>
        <textarea id="custom_instruction" class="form-control" rows="3" placeholder="e.g., focus on school scenarios"></textarea>

        <label class="form-label mt-2">Default model (for all stages)</label>
        <input id="default_model" class="form-control" value="openai/gpt-4.1-mini"/>

        <div class="form-check mt-2"><input class="form-check-input" id="enable_data_specialist" type="checkbox" checked><label class="form-check-label">Enable data specialist</label></div>
        <div class="form-check"><input class="form-check-input" id="enable_format_context" type="checkbox" checked><label class="form-check-label">Enable format context for headlines</label></div>

        <button id="startBtn" class="btn btn-primary mt-3">Generate</button>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card p-3 mb-3">
        <h2 class="h5">Runs & Live Agent Conversations</h2>
        <select id="runSelect" class="form-select mb-2"></select>
        <div id="runStatus" class="mb-2"></div>
        <div id="logs" class="logbox mono"></div>
      </div>

      <div class="card p-3 mb-3">
        <h2 class="h5">Latest CSV Records</h2>
        <div id="records" class="mono" style="max-height:250px; overflow:auto"></div>
      </div>

      <div class="card p-3">
        <h2 class="h5">Agent Prompt Editor</h2>
        <select id="agentSelect" class="form-select mb-2"></select>
        <label class="form-label">Persona</label>
        <textarea id="agentPersona" class="form-control mono" rows="4"></textarea>
        <label class="form-label mt-2">Project Context</label>
        <textarea id="agentProjectContext" class="form-control mono" rows="3"></textarea>
        <label class="form-label mt-2">Goal</label>
        <textarea id="agentGoal" class="form-control mono" rows="3"></textarea>
        <button id="saveAgentBtn" class="btn btn-outline-light mt-2">Apply Agent Changes</button>
      </div>
    </div>
  </div>

<script>
let bootstrapData = null;
let agents = {};

async function fetchJSON(url, options={}) { const r = await fetch(url, options); return await r.json(); }

function selectedValues(select) { return [...select.options].filter(o => o.selected).map(o => o.value); }

function renderRuns(runs) {
  const sel = document.getElementById('runSelect');
  const current = sel.value;
  sel.innerHTML = runs.map(r => `<option value="${r.run_id}">${r.run_id} | ${r.status}</option>`).join('');
  if (current) sel.value = current;
}

function renderRecords(records) {
  document.getElementById('records').textContent = records.map(r => `${r.created_at} | ${r.stage} | ${r.id} | ${r.payload.slice(0,160)}...`).join('\n');
}

function renderAgentDropdown() {
  const sel = document.getElementById('agentSelect');
  sel.innerHTML = Object.keys(agents).map(k => `<option value="${k}">${k}</option>`).join('');
  loadAgentIntoEditor();
}

function loadAgentIntoEditor() {
  const key = document.getElementById('agentSelect').value;
  const a = agents[key];
  if (!a) return;
  document.getElementById('agentPersona').value = a.persona || '';
  document.getElementById('agentProjectContext').value = a.project_context || '';
  document.getElementById('agentGoal').value = a.goal || '';
}

async function refreshRuns() {
  const runs = await fetchJSON('/api/runs');
  renderRuns(runs);
  const selectedRunId = document.getElementById('runSelect').value;
  if (!selectedRunId) return;
  const run = await fetchJSON(`/api/runs/${selectedRunId}`);
  document.getElementById('runStatus').textContent = `Status: ${run.run.status}`;
  document.getElementById('logs').textContent = run.events.map(e => `[${e.ts}] (${e.stage}) ${e.agent}/${e.role}: ${e.message}`).join('\n\n');
}

async function init() {
  bootstrapData = await fetchJSON('/api/bootstrap');
  agents = bootstrapData.agents;
  renderRuns(bootstrapData.runs);
  renderRecords(bootstrapData.records);
  renderAgentDropdown();
  setInterval(refreshRuns, 3000);
}

document.getElementById('startBtn').onclick = async () => {
  const model = document.getElementById('default_model').value;
  const stages = selectedValues(document.getElementById('stages'));
  const model_map = {};
  stages.forEach(s => model_map[s] = model);
  const payload = {
    selected_stages: stages,
    mode: document.getElementById('mode').value,
    output_count: Number(document.getElementById('output_count').value),
    target_minutes: Number(document.getElementById('target_minutes').value),
    target_parts: Number(document.getElementById('target_parts').value),
    temperature: Number(document.getElementById('temperature').value),
    max_context_chars: Number(document.getElementById('max_context_chars').value),
    custom_instruction: document.getElementById('custom_instruction').value,
    model_map,
    enable_data_specialist: document.getElementById('enable_data_specialist').checked,
    enable_format_context: document.getElementById('enable_format_context').checked,
  };
  const res = await fetchJSON('/api/run', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)});
  alert(`Run started: ${res.run_id}`);
  refreshRuns();
};

document.getElementById('runSelect').onchange = refreshRuns;
document.getElementById('agentSelect').onchange = loadAgentIntoEditor;

document.getElementById('saveAgentBtn').onclick = async () => {
  const key = document.getElementById('agentSelect').value;
  if (!agents[key]) return;
  agents[key].persona = document.getElementById('agentPersona').value;
  agents[key].project_context = document.getElementById('agentProjectContext').value;
  agents[key].goal = document.getElementById('agentGoal').value;
  await fetchJSON('/api/agents', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(agents)});
  alert('Agent config saved');
};

init();
</script>
</body>
</html>
